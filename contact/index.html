<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Dennis Sun</title>
  <style>
    
    body {
      margin: 0;
      padding: 0;
      padding-top: 60px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-image: url('../photography/pittsburgh/DSC_6046.JPG');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #FFF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background-color: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 0 20px;
      display: flex;
      align-items: center;
      z-index: 1000;
    }

    .logo {
      font-size: 1.5em;
      color: #333;
      text-decoration: none;
    }

    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 1.1em;
      color: #333;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: #666;
    }

    .nav-links a.active {
      color: #111;
      font-weight: 600;
      border-bottom: 2px solid #333;
      padding-bottom: 2px;
    }

    
    .contact-card {
      background: rgba(0, 0, 0, 0.6); /* 半透明背景 */
      padding: 40px;
      border-radius: 12px; /* 圆角 */
      max-width: 500px;
      width: 90%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); /* 添加阴影 */
    }

    
    .contact-title {
      font-size: 2rem;
      margin-bottom: 20px;
      font-weight: bold;
    }

    
    .contact-info {
      font-size: 1.2rem;
      margin: 10px 0;
    }

    
    .contact-info a {
      color: #FFD700; /* 金色 */
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .contact-info a:hover {
      color: #FFA500; /* 橙色 */
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a class="logo" href="../index.html">Dennis' Website</a>
    <div class="nav-links">
      <a href="../introduction/index.html">About Me</a>
      <a href="../demo reel/index.html">Demo Reel</a>
      <a href="../projects/index.html">Projects</a>
      <a href="../photography/photography.html">Photography Gallery</a>
      <a href="../contact/index.html" class="active">Contact</a>
    </div>
  </div>

  <div class="contact-card">
    <div class="contact-title">Contact Me</div>
    <div class="contact-info">📧 Email: <a href="mailto:shaoqias@andrew.cmu.edu">shaoqias@andrew.cmu.edu</a></div>
    <div class="contact-info">📞 Phone: +1 (412) 816-5301, +86 18823356752</div>
    <div class="contact-info">📍 Location: Pittsburgh, PA</div>
    <!-- <div class="contact-info">🔗 Portfolio: <a href="https://your-portfolio.com" target="_blank">your-portfolio.com</a></div> -->
  </div>

</body>
</html>
