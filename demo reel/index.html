<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Reel — Dennis Sun</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      height: 60px;
      background-color: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 0 20px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.5em;
      color: #333;
      text-decoration: none;
    }

    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 1.1em;
      color: #333;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: #666;
    }

    .nav-links a.active {
      color: #111;
      font-weight: 600;
      border-bottom: 2px solid #333;
      padding-bottom: 2px;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.2em;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 36px;
      color: #f0f0f0;
    }

    .video-wrapper {
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a class="logo" href="../index.html">Dennis' Website</a>
    <div class="nav-links">
      <a href="../introduction/index.html">About Me</a>
      <a href="../demo reel/index.html" class="active">Demo Reel</a>
      <a href="../projects/index.html">Projects</a>
      <a href="../photography/photography.html">Photography Gallery</a>
      <a href="../contact/index.html">Contact</a>
    </div>
  </div>

  <div class="content">
    <h1>Demo Reel</h1>
    <div class="video-wrapper">
      <video controls autoplay muted>
        <source src="Portfolio.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

</body>
</html>
